name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > suivi_raw.jks

      - name: Detect keystore type
        id: detect
        run: |
          SIZE=$(stat -c%s suivi_raw.jks)
          echo "Decoded keystore size: $SIZE bytes"
          if [ "$SIZE" -lt 500 ]; then
            echo "ERROR: decoded file is suspiciously small — KEYSTORE_BASE64 secret is likely truncated or wrong."
            exit 1
          fi
          MAGIC=$(xxd -p -l4 suivi_raw.jks)
          echo "First 4 bytes (hex): $MAGIC"
          if [ "$MAGIC" == "feedfeed" ]; then
            echo "Detected format: JKS"
            echo "store_type=JKS" >> "$GITHUB_OUTPUT"
          elif [[ "$MAGIC" == 3082* ]]; then
            echo "Detected format: PKCS12"
            echo "store_type=PKCS12" >> "$GITHUB_OUTPUT"
          else
            echo "ERROR: unrecognized keystore format (magic bytes: $MAGIC)."
            echo "KEYSTORE_BASE64 is likely corrupted."
            exit 1
          fi

      - name: Normalize keystore to real JKS format
        run: |
          keytool -importkeystore \
            -srckeystore suivi_raw.jks -srcstoretype "${{ steps.detect.outputs.store_type }}" \
            -srcalias "${{ secrets.KEY_ALIAS }}" \
            -srcstorepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -srckeypass "${{ secrets.KEY_PASSWORD }}" \
            -destkeystore suivi.jks -deststoretype JKS \
            -deststorepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -destkeypass "${{ secrets.KEY_PASSWORD }}"
          echo "Keystore normalized to genuine JKS format."
          keytool -list -keystore suivi.jks -storepass "${{ secrets.KEYSTORE_PASSWORD }}"

      - name: Build and Patch
        run: |
          mkdir -p www
          cp index.html www/
          echo '{"name":"suivi-recitation","version":"1.0.0","private":true}' > package.json
          npm install @capacitor/core@5 @capacitor/cli@5 @capacitor/android@5
          python3 -c "import json; open('capacitor.config.json','w').write(json.dumps({'appId':'com.suivirecitation.fautes','appName':'Suivi Recitation','webDir':'www','androidScheme':'https','android':{'allowMixedContent':True}}, indent=2))"
          npx cap add android
          npx cap sync android
          npm install @capacitor/assets --save-dev
          npx capacitor-assets generate --android
          GRADLE_FILE="android/app/build.gradle"
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" "$GRADLE_FILE"
          sed -i "s/versionName \"[^\"]*\"/versionName \"1.0.${{ github.run_number }}\"/" "$GRADLE_FILE"
          cp suivi.jks android/app/suivi.jks
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/app/suivi.jks" \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: suivi-recitation-apk
          path: android/app/build/outputs/apk/release/app-release.apk
